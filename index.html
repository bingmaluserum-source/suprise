<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: black;
  color: lime;
  font-family: monospace;
  text-align: center;
  overflow: hidden;
  margin: 0;
}

/* Sections */
#main, #question, #final, #countdown {
  display: none;
  padding: 20px;
}

/* Buttons */
button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  cursor: pointer;
  border-radius: 10px;
}

#noBtn {
  position: absolute;
}

/* Message */
#message {
  color: white;
  font-family: Arial;
  font-size: 18px;
}

/* Fireworks */
.firework {
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  0% {transform: scale(1);}
  100% {transform: scale(20); opacity: 0;}
}
</style>

</head>

<body>

<audio id="music" src="music.mp3.mp3" preload="auto"></audio>

<div id="start">
  <h2><a href="#" onclick="start()">Click Me 😊</a></h2>
</div>

<div id="main">
  <p id="code"></p>
</div>

<div id="question">
  <p>System Request: Do you accept?</p>
  <button onclick="yes()">YES</button>
  <button id="noBtn" onmouseover="moveNo()">NO</button>
</div>

<div id="countdown">
  <h2>Preparing something for you WILMAH... ❤️</h2>
  <h1 id="timer">3</h1>
</div>

<div id="final">
  <h2>❤️ For You, WILMAH ❤️</h2>
  <img src="zaza.jpg.jpg" width="90%" style="max-width:300px;"><br><br>
  <p id="message"></p>
</div>

<script>
let codeText = "Initializing...\nDecrypting.exe...\nAccessing feelings...\nLoading love...\n";

function start() {
  document.getElementById("start").style.display = "none";
  document.getElementById("main").style.display = "block";

  let i = 0;
  function typeCode() {
    if (i < codeText.length) {
      document.getElementById("code").innerHTML += codeText.charAt(i);
      i++;
      setTimeout(typeCode, 40);
    } else {
      setTimeout(() => {
        document.getElementById("main").style.display = "none";
        document.getElementById("question").style.display = "block";
      }, 1000);
    }
  }
  typeCode();
}

function yes() {
  document.getElementById("question").style.display = "none";
  document.getElementById("countdown").style.display = "block";

  let count = 3;
  let timer = setInterval(() => {
    count--;
    document.getElementById("timer").innerText = count;

    if (count === 0) {
      clearInterval(timer);
      document.getElementById("countdown").style.display = "none";
      showFinal();
    }
  }, 1000);
}

function showFinal() {
  document.getElementById("final").style.display = "block";
  document.getElementById("music").play();

  typeMessage();
  launchFireworks();
}

function moveNo() {
  let btn = document.getElementById("noBtn");
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

let message = "WILMAH, from the moment you came into my life, Blaaaaa blaaa blaaaaaa blaaaaa bal! Bla bla blaaa blaaa bla! ❤️";

let j = 0;
function typeMessage() {
  if (j < message.length) {
    document.getElementById("message").innerHTML += message.charAt(j);
    j++;
    setTimeout(typeMessage, 40);
  }
}

function launchFireworks() {
  setInterval(() => {
    let f = document.createElement("div");
    f.className = "firework";
    f.style.left = Math.random() * window.innerWidth + "px";
    f.style.top = Math.random() * window.innerHeight + "px";
    f.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
    document.body.appendChild(f);

    setTimeout(() => f.remove(), 1000);
  }, 300);
}
</script>

</body>
</html>
